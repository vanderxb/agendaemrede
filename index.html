<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agenda da Rede</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f5ede0;
      --bg2:          #ede0cc;
      --surface:      #fdf7f0;
      --border:       #ddd0bb;
      --purple:       #7b4fa6;
      --purple-light: #a97fd4;
      --purple-pale:  #ede0f5;
      --navy:         #1a1f5e;
      --navy-light:   #2d3580;
      --teal:         #3a8fa0;
      --text:         #1a1a2e;
      --muted:        #8a7a6a;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Nunito', sans-serif;
      --radius:       16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ── Decorative dots pattern (top of header) ── */
    .dots-border {
      height: 28px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      overflow: hidden;
      padding: 0 1rem;
    }

    .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Header ── */
    header {
      background: var(--bg);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      position: relative;
      border-bottom: 3px solid var(--purple-pale);
    }

    .header-logo {
      font-family: var(--font-display);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .header-logo .cafe {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-style: italic;
      font-weight: 400;
      color: var(--purple-light);
      display: block;
    }

    .header-logo .rede {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700;
      color: var(--navy);
      display: block;
      letter-spacing: -0.02em;
      line-height: 0.9;
    }

    .header-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .header-sub span { color: var(--purple); font-weight: 700; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 1.25rem 2rem 0.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    .filter-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.4rem 1.1rem;
      cursor: pointer;
      border-radius: 999px;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .filter-btn:hover { border-color: var(--purple-light); color: var(--purple); }

    .filter-btn.active {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    /* ── Counter ── */
    .counter {
      text-align: center;
      padding: 0.25rem 2rem 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Grid ── */
    main { padding: 0.5rem 2rem 3rem; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 0.75rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    .card:hover {
      box-shadow: 0 12px 32px rgba(123, 79, 166, 0.15);
      transform: translateY(-4px);
    }

    .card.past { opacity: 0.5; filter: grayscale(0.4); }
    .card.past:hover { opacity: 0.72; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* Banner */
    .card-banner {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    /* Card no-banner placeholder */
    .card-banner-placeholder {
      height: 8px;
      background: linear-gradient(90deg, var(--purple) 0%, var(--teal) 50%, var(--purple-light) 100%);
    }

    /* Card body */
    .card-body {
      padding: 1.25rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      flex: 1;
    }

    /* Title */
    .card-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.25;
      flex: 1;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .badge-past {
      font-size: 0.6rem;
      font-weight: 700;
      background: var(--bg2);
      color: var(--muted);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Props */
    .props { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; }

    .prop {
      display: flex;
      gap: 0.5rem;
      font-size: 0.82rem;
      align-items: flex-start;
      line-height: 1.45;
    }

    .prop-icon { flex-shrink: 0; width: 20px; text-align: center; font-size: 0.9rem; }
    .prop-text { color: var(--text); word-break: break-word; overflow-wrap: break-word; }

    /* Observações */
    .obs {
      background: var(--purple-pale);
      border-left: 3px solid var(--purple-light);
      border-radius: 0 8px 8px 0;
      padding: 0.5rem 0.75rem;
      font-size: 0.78rem;
      color: var(--navy-light);
      line-height: 1.5;
      font-style: italic;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    /* Footer do card */
    .card-footer {
      border-top: 2px solid var(--purple-pale);
      padding: 0.9rem 1.4rem;
    }

    .btn-inscricao {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--purple);
      color: #fff;
      text-decoration: none;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.55rem 1.2rem;
      border-radius: 999px;
      transition: background 0.15s, transform 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-inscricao:hover { background: var(--navy); transform: scale(1.03); }

    /* ── State ── */
    #state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .spinner {
      display: inline-block;
      width: 30px; height: 30px;
      border: 3px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      background: var(--navy);
      padding: 1.5rem 2rem;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-family: var(--font-body);
    }

    footer a { color: var(--purple-light); text-decoration: none; }

    @media (max-width: 600px) {
      header { padding: 2rem 1.25rem 1.75rem; }
      main, .toolbar, .counter { padding-left: 1.25rem; padding-right: 1.25rem; }
      footer { padding: 1.25rem; }
    }
  </style>
</head>
<body>

<!-- Decorative dot border -->
<div class="dots-border" id="dots-top"></div>

<header>
  <div class="header-logo">
    <span class="cafe">Agenda em</span>
    <span class="rede">REDE</span>
  </div>
  <p class="header-sub">Atualizado em <span id="last-updated">—</span></p>
</header>

<nav style="display:flex;justify-content:center;gap:0.5rem;padding:0.75rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;">
  <a style="background:var(--purple);border:2px solid var(--purple);color:#fff;font-family:var(--font-body);font-size:0.8rem;font-weight:700;padding:0.4rem 1.1rem;border-radius:999px;text-decoration:none;">📅 Agenda</a>
  <a href="mapa.html" style="background:none;border:2px solid var(--border);color:var(--muted);font-family:var(--font-body);font-size:0.8rem;font-weight:700;padding:0.4rem 1.1rem;border-radius:999px;text-decoration:none;">🗺️ Mapa</a>
</nav>

<div class="toolbar">
  <button class="filter-btn active" data-filter="futuros">Próximos eventos</button>
  <button class="filter-btn" data-filter="todos">Todos</button>
  <button class="filter-btn" data-filter="passados">Encerrados</button>
</div>

<div class="counter" id="counter"></div>

<main>
  <div id="state">
    <div class="spinner"></div>
    <div>Carregando agenda...</div>
  </div>
  <div id="grid" style="display:none"></div>
</main>

<div class="dots-border" id="dots-bottom"></div>

<footer>
  <span>Desenvolvido por <a href="https://www.despertar.org.br" target="_blank">Despertar</a> · Agenda dos eventos das instituições participantes do Café em Rede</span>
  <span id="footer-count"></span>
</footer>

<script>
  // Gera bolinhas coloridas decorativas
  const colors = [
    '#7b4fa6','#a97fd4','#c8a4e8','#1a1f5e','#2d3580','#3a8fa0',
    '#5ab8cc','#9b59b6','#6c3483','#1f618d','#148f77','#d4a8f0'
  ];

  function makeDots(containerId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    for (let i = 0; i < 48; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      const size = 8 + Math.random() * 10;
      d.style.cssText = `
        width:${size}px;height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        opacity:${0.5 + Math.random()*0.5};
        border-radius:${Math.random() > 0.3 ? '50%' : '3px'};
      `;
      el.appendChild(d);
    }
  }

  makeDots('dots-top');
  makeDots('dots-bottom');

  // ── Data ──
  const stateEl   = document.getElementById('state');
  const gridEl    = document.getElementById('grid');
  const counterEl = document.getElementById('counter');
  let allItems = [];
  let currentFilter = 'futuros';

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  async function load() {
    try {
      const res = await fetch('data.json?v=' + Date.now());
      if (!res.ok) throw new Error('Arquivo data.json não encontrado.');
      const data = await res.json();

      allItems = data.items || [];

      if (data.updated_at) {
        document.getElementById('last-updated').textContent =
          new Date(data.updated_at).toLocaleString('pt-BR');
      }

      document.getElementById('footer-count').textContent =
        `${allItems.length} evento${allItems.length !== 1 ? 's' : ''} cadastrado${allItems.length !== 1 ? 's' : ''}`;

      render();
    } catch (e) {
      stateEl.innerHTML = `
        <div style="font-size:2rem;margin-bottom:0.5rem">⚠️</div>
        <div>${e.message}</div>
        <div style="margin-top:0.5rem;font-size:0.75rem">
          Execute o GitHub Action para gerar o data.json
        </div>`;
    }
  }

  function isEventPast(item) {
    const endStr = item.data_final || item.data_inicial;
    if (!endStr) return false;
    const end = new Date(endStr);
    end.setHours(23, 59, 59);
    return end < new Date();
  }

  function render() {
    let items = allItems;
    if (currentFilter === 'futuros')  items = allItems.filter(i => !isEventPast(i));
    if (currentFilter === 'passados') items = allItems.filter(i => isEventPast(i));

    items = [...items].sort((a, b) => {
      if (!a.data_inicial) return 1;
      if (!b.data_inicial) return -1;
      return new Date(a.data_inicial) - new Date(b.data_inicial);
    });

    counterEl.textContent = `${items.length} evento${items.length !== 1 ? 's' : ''}`;

    stateEl.style.display = 'none';
    gridEl.style.display = 'grid';
    gridEl.innerHTML = '';

    if (!items.length) {
      gridEl.style.display = 'none';
      stateEl.style.display = 'block';
      stateEl.innerHTML = '<div style="font-size:2rem">🌿</div><div style="margin-top:0.5rem">Nenhum evento encontrado.</div>';
      return;
    }

    items.forEach((item, i) => {
      const past = isEventPast(item);
      const card = document.createElement('div');
      card.className = 'card' + (past ? ' past' : '');
      card.style.animationDelay = `${i * 50}ms`;

      let periodo = '';
      if (item.data_inicial && item.data_final && item.data_inicial !== item.data_final) {
        periodo = `${formatDate(item.data_inicial)} a ${formatDate(item.data_final)}`;
      } else if (item.data_inicial) {
        periodo = formatDate(item.data_inicial);
      }

      let horario = '';
      if (item.horario_inicial && item.horario_final) {
        horario = `${item.horario_inicial} às ${item.horario_final}`;
      } else if (item.horario_inicial) {
        horario = item.horario_inicial;
      }

      const bannerHtml = item.banner
        ? `<img class="card-banner" src="${item.banner}" alt="${item.nome}" loading="lazy">`
        : `<div class="card-banner-placeholder"></div>`;

      card.innerHTML = `
        ${bannerHtml}
        <div class="card-body">
          <div class="card-title-row">
            <div class="card-title">${item.nome || 'Sem título'}</div>
            ${past ? '<span class="badge-past">Encerrado</span>' : ''}
          </div>
          <div class="props">
            ${item.instituicao ? `<div class="prop"><span class="prop-icon">🏫</span><span class="prop-text">${item.instituicao}</span></div>` : ''}
            ${periodo         ? `<div class="prop"><span class="prop-icon">📅</span><span class="prop-text">${periodo}</span></div>` : ''}
            ${horario         ? `<div class="prop"><span class="prop-icon">⏰</span><span class="prop-text">${horario}</span></div>` : ''}
            ${item.local      ? `<div class="prop"><span class="prop-icon">📍</span><span class="prop-text">${item.local}</span></div>` : ''}
            ${item.observacoes ? `<div class="obs">💬 ${item.observacoes}</div>` : ''}
          </div>
        </div>
        ${item.link_inscricao ? `
        <div class="card-footer">
          <a class="btn-inscricao" href="${item.link_inscricao}" target="_blank" rel="noopener">
            🔗 Inscreva-se
          </a>
        </div>` : ''}
      `;

      gridEl.appendChild(card);
    });
  }

  function formatDate(str) {
    if (!str) return '';
    if (str.includes('-')) {
      const [y, m, d] = str.split('-');
      return `${d}/${m}/${y}`;
    }
    return str;
  }

  load();
</script>
</body>
</html>
